services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:8025:5000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://cairn:cairn_nbne_2026@host.docker.internal:5432/claw}
      SECRET_KEY: ${SECRET_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      EBAY_CLIENT_ID: ${EBAY_CLIENT_ID}
      EBAY_CLIENT_SECRET: ${EBAY_CLIENT_SECRET}
      EBAY_RU_NAME: ${EBAY_RU_NAME}
      EBAY_ENVIRONMENT: ${EBAY_ENVIRONMENT:-PRODUCTION}
      EBAY_MERCHANT_LOCATION_KEY: ${EBAY_MERCHANT_LOCATION_KEY:-default}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://render.nbnesigns.co.uk}
      IMAGES_DIR: /images
      SMTP_HOST: ${SMTP_HOST:-smtp.ionos.co.uk}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      ETSY_API_KEY: ${ETSY_API_KEY}
      ETSY_SHARED_SECRET: ${ETSY_SHARED_SECRET}
      ETSY_SHOP_ID: ${ETSY_SHOP_ID:-11706740}
      ETSY_REDIRECT_URI: ${ETSY_REDIRECT_URI:-https://render.nbnesigns.co.uk/etsy/oauth/callback}
      PHLOE_API_URL: ${PHLOE_API_URL:-https://app.nbnesigns.co.uk}
      PHLOE_TENANT_SLUG: ${PHLOE_TENANT_SLUG:-mind-department}
      PHLOE_USERNAME: ${PHLOE_USERNAME}
      PHLOE_PASSWORD: ${PHLOE_PASSWORD}
      AMAZON_CLIENT_ID: ${AMAZON_CLIENT_ID}
      AMAZON_CLIENT_SECRET: ${AMAZON_CLIENT_SECRET}
      AMAZON_REFRESH_TOKEN_EU: ${AMAZON_REFRESH_TOKEN_EU}
      AMAZON_SELLER_ID_EU: ${AMAZON_SELLER_ID_EU:-ANO0V0M1RQZY9}
      AMAZON_MARKETPLACE_ID_UK: ${AMAZON_MARKETPLACE_ID_UK:-A1F83G8C2ARO7P}
    volumes:
      - /data/render/images:/images
    extra_hosts:
      - "host.docker.internal:host-gateway"
