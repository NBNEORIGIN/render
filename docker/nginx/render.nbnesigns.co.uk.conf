server {
    listen 80;
    server_name render.nbnesigns.co.uk;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name render.nbnesigns.co.uk;

    ssl_certificate     /etc/letsencrypt/live/render.nbnesigns.co.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/render.nbnesigns.co.uk/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 50M;

    # Product images — served by nginx directly from the Docker volume
    # This avoids going through Flask and gives Amazon/Etsy/eBay fast image loads
    location /images/ {
        alias /opt/nbne/render/images/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
    }

    # Everything else — Flask app
    location / {
        proxy_pass         http://127.0.0.1:8025;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
